# Required for Docker, Kubernetes CNIs, and WireGuard
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# Prevent PMTU blackholes (especially important for WireGuard)
net.ipv4.ip_no_pmtu_disc = 1

# Required for Kubernetes networking and Docker container traffic
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.bridge.bridge-nf-call-arptables = 1

# rp_filter=2 avoids breaking WireGuard + Kubernetes overlays
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# ICMP protections
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Disable redirects (security best-practice)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable IPv6 router advertisements (unless running IPv6 gateway)
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# Prevent ARP poisoning on docker0, cni0, flannel, wg0, etc.
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2

# Syn flood and DDOS protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 4096
net.core.somaxconn = 4096
net.core.netdev_max_backlog = 16384

# TCP enhancements
net.ipv4.tcp_rfc1337 = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_dsack = 1
net.ipv4.tcp_fack = 1

# Modern congestion control (massive WG/Docker perf boost)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# UDP buffer tuning
net.core.rmem_default = 262144
net.core.rmem_max = 4194304
net.core.wmem_default = 262144
net.core.wmem_max = 4194304

# Log suspicious packets
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Kernel hardening
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 1
kernel.kexec_load_disabled = 1
kernel.unprivileged_userns_clone = 0
kernel.unprivileged_bpf_disabled = 1

# Protect low memory pages
vm.mmap_min_addr = 65536

# Prevent K3s kubelet / containerd odd behaviors
vm.overcommit_memory = 1
vm.swappiness = 0

# Raise global file descriptors limit
fs.file-max = 2097152

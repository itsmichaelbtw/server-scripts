# WireGuard client configuration (auto-generated)
# Client Address should be a single host ({{CLIENT_IP}}) - typically /32

[Interface]
PrivateKey = {{CLIENT_PRIVATE_KEY}}
Address = {{CLIENT_IP}}
DNS = 1.1.1.1
MTU = 1420

[Peer]
PublicKey = {{SERVER_PUBLIC_KEY}}
Endpoint = {{SERVER_ENDPOINT}}:{{SERVER_PORT}}
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25

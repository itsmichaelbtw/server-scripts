ports:
  web:
    expose: true
  websecure:
    expose: true

dashboard:
  enabled: {{DASHBOARD_ENABLED}}

additionalArguments:
  - "--providers.kubernetescrd"
  - "--entrypoints.web.address=:80"
  - "--entrypoints.websecure.address=:443"

certificatesResolvers:
  cloudflare:
    acme:
      email: {{ACME_EMAIL}}
      storage: /data/acme.json
      keyType: EC256
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 0

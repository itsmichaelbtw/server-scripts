ALERTMANAGER_PORT=3075
ALLOY_PORT=3100

# ── GUI / Dashboards ──────────────────────────────────────────────────────────

GRAFANA_PORT=3000
NETDATA_PORT=19999
FILEBROWSER_PORT=4025
CRONTAB_UI_PORT=4050
GATUS_PORT=4075
VAULTWARDEN_PORT=4100
HOMER_PORT=80

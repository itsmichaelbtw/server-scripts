# ports.conf - Host port configuration for all deployed services
#
# Each value here sets the port exposed on the host machine.
# This file is required — scripts will exit if it is missing or a variable is undefined.
# Edit this file before running deployment scripts to customise ports.
#
# After editing, re-run the relevant script(s) to redeploy with the new port.

# ── Monitoring ────────────────────────────────────────────────────────────────

PROMETHEUS_PORT=5010
LOKI_PORT=5020
ALERTMANAGER_PORT=5030
ALLOY_PORT=5040

# ── GUI / Dashboards ──────────────────────────────────────────────────────────

GRAFANA_PORT=5000
NETDATA_PORT=19999
FILEBROWSER_PORT=5050
CRONTAB_UI_PORT=5060
GATUS_PORT=5070
VAULTWARDEN_PORT=5080
HOMER_PORT=80
PORTAINER_PORT=5090

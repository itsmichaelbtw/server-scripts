# Prometheus Configuration
# Metrics collection and time-series database

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'prometheus'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:{{ALERTMANAGER_INTERNAL_PORT}}']

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:{{PROMETHEUS_INTERNAL_PORT}}']

  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:{{ALLOY_INTERNAL_PORT}}']
    scrape_interval: 10s
    metrics_path: '/metrics'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:{{LOKI_INTERNAL_PORT}}']
    scrape_interval: 10s
    metrics_path: '/metrics'

# AlertManager Configuration
# Alert routing and notification delivery

global:
  resolve_timeout: 5m

# The root route with all parameters
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

# Inhibition rules
inhibit_rules: []

# Receivers (notification destinations)
receivers:
  - name: 'default'

title: "App Dashboard"
subtitle: "Private Network Services"

header: false
footer: false

columns: "3"
connectivityCheck: true

defaults:
  layout: list
  colorTheme: auto

theme: default

links: []

services:
  - name: "Monitoring"
    icon: "fas fa-chart-line"
    items:
      - name: "Prometheus"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/prometheus.webp"
        subtitle: "Metrics"
        tag: "monitoring"
        url: http://{{WG_IP}}:{{PROMETHEUS_PORT}}
        target: "_blank"
      - name: "Loki"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/loki.webp"
        subtitle: "Log aggregation"
        tag: "monitoring"
        url: http://{{WG_IP}}:{{LOKI_PORT}}/metrics
        target: "_blank"
      - name: "Alert Manager"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/alertmanager.webp"
        subtitle: "Alert management"
        tag: "monitoring"
        url: http://{{WG_IP}}:{{ALERTMANAGER_PORT}}
        target: "_blank"
      - name: "Alloy"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/alloy.webp"
        subtitle: "Telemetry collector"
        tag: "monitoring"
        url: http://{{WG_IP}}:{{ALLOY_PORT}}
        target: "_blank"

  - name: "GUI"
    icon: "fas fa-tools"
    items:
      - name: "Netdata"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/netdata.webp"
        subtitle: "System monitoring"
        tag: "gui"
        url: http://{{WG_IP}}:{{NETDATA_PORT}}/v3/
        target: "_blank"
      - name: "Filebrowser"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/filebrowser.webp"
        subtitle: "File manager"
        tag: "gui"
        url: http://{{WG_IP}}:{{FILEBROWSER_PORT}}
        target: "_blank"
      - name: "Crontab UI"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/cron-master.webp"
        subtitle: "Cron job manager"
        tag: "gui"
        url: http://{{WG_IP}}:{{CRONTAB_UI_PORT}}
        target: "_blank"
      - name: "Gatus"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/gatus.webp"
        subtitle: "Status page"
        tag: "gui"
        url: http://{{WG_IP}}:{{GATUS_PORT}}
        target: "_blank"
      - name: "Vaultwarden"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/vaultwarden-light.webp"
        subtitle: "Password manager"
        tag: "gui"
        url: https://{{WG_IP}}:{{VAULTWARDEN_PORT}}
        target: "_blank"
      - name: "Grafana"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/grafana.webp"
        subtitle: "Dashboards"
        tag: "gui"
        url: http://{{WG_IP}}:{{GRAFANA_PORT}}
        target: "_blank"
      - name: "Portainer"
        logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/portainer.webp"
        subtitle: "Container management"
        tag: "gui"
        url: https://{{WG_IP}}:{{PORTAINER_PORT}}
        target: "_blank"
